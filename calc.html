<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Bin</title>
    <style>
        @media (max-width:540px) {
            div.empty {display: none;}
            div.vertical {display: block;}
            div.horizontal {display: none;}
        }
        @media (max-width:360px) {
            div.empty {display: block;}
            div.vertical {display: none;}
            div.horizontal {display: none;}
        }
        @media(min-width:541px){
            div.empty {display: none;}
            div.vertical {display: none;}
            div.horizontal {display: block;}
        }

        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        div.empty {
            color: red;
            font-size: 16px;
            padding: 20px;
        }

        .calc-wrap {
            background: #d4d4d4;
            border: 1px solid #aaa;
            border-radius: 6px;
            padding: 10px;
        }

        #display-v,
        #display-h {
            width: 100%;
            height: 80px;
            background: white;
            border: 1px solid #aaa;
            font-size: 30px;
            text-align: right;
            padding: 0 10px;
            margin-bottom: 6px;
            box-sizing: border-box;
        }

        button {
            width: 70px;
            height: 55px;
            font-size: 25px;
            background: #c9cccd;
            border: 1px solid #bbb;
            border-radius: 2px;
            cursor: pointer;
        }

        button.num{
            background: #ebebeb;
            font-weight: bold;
        }

        button:hover {
            background: #c8c8c8;
        }

        button.op {
            background: #fbcb05;
            border-color: #fbcb05;
            font-weight: bold;
        }

        button.op:hover {
            background: #e09310;
        }

        table {
            border-collapse: separate;
            border-spacing: 5px;
        }

        td {
            padding: 0;
        }

        .logo-bar {
            text-align: center;
            margin-top: 8px;
            font-size: 13px;
        }

        .logo-bar a {
            color: #1a6fba;
            text-decoration: none;
        }

        .logo-bar a:hover {
            text-decoration: underline;
        }

        .logo-bar .copy {
            font-size: 12px;
            color: #555;
            margin-top: 2px;
        }

        .logo-bar .copy strong {
            color: #1a6fba;
        }
    </style>
</head>

<body>

    <!-- 화면 너무 좁을 때 -->
    <div class="empty">
        <p>표시할 수 없습니다. 화면의 크기를 키워주세요!</p>
    </div>

    <!-- ════════ 세로 레이아웃 (361~540px) ════════ -->
    <div class="vertical">
        <div class="calc-wrap">
            <table width="340">
                <tr>
                    <td colspan="4">
                        <input type="text" id="display-v" value="0" readonly>
                    </td>
                </tr>
                <tr>
                    <td><button></button></td>
                    <td><button></button></td>
                    <td><button></button></td>
                    <td><button></button></td>
                </tr>
                <tr>
                    <td><button>CE</button></td>
                    <td><button>√x</button></td>
                    <td><button>%</button></td>
                    <td><button class="op">÷</button></td>
                </tr>
                <tr>
                    <td><button class="num">7</button></td>
                    <td><button class="num">8</button></td>
                    <td><button class="num">9</button></td>
                    <td><button class="op">×</button></td>
                </tr>
                <tr>
                    <td><button class="num">4</button></td>
                    <td><button class="num">5</button></td>
                    <td><button class="num">6</button></td>
                    <td><button class="op">-</button></td>
                </tr>
                <tr>
                    <td><button class="num">1</button></td>
                    <td><button class="num">2</button></td>
                    <td><button class="num">3</button></td>
                    <td><button class="op">+</button></td>
                </tr>
                <tr>
                    <td><button class="num">0</button></td>
                    <td><button class="num">.</button></td>
                    <td><button class="num">+/-</button></td>
                    <td><button class="op">=</button></td>
                </tr>
                <tr>
                    <td><button>π</button></td>
                    <td><button>x²</button></td>
                    <td><button>R2</button></td>
                    <td><button>R0</button></td>
                </tr>
            </table>
            <div class="logo-bar">
                <div class="copy"><strong>20253320</strong> 양현지</div>
            </div>
        </div>
    </div>

    <!-- ════════ 가로 레이아웃 ════════ -->
    <div class="horizontal">
        <div class="calc-wrap">
            <table width="520">
                <tr>
                    <td colspan="7">
                        <input type="text" id="display-h" value="0" readonly>
                    </td>
                </tr>
                <tr>
                    <td><button></button></td>
                    <td><button></button></td>
                    <td><button class="num">7</button></td>
                    <td><button class="num">8</button></td>
                    <td><button class="num">9</button></td>
                    <td><button class="op">÷</button></td>
                    <td><button>R2</button></td>
                </tr>
                <tr height="80">
                    <td><button></button></td>
                    <td><button></button></td>
                    <td><button class="num">4</button></td>
                    <td><button class="num">5</button></td>
                    <td><button class="num">6</button></td>
                    <td><button class="op">×</button></td>
                    <td><button>R0</button></td>
                </tr>
                <tr height="80">
                    <td><button>π</button></td>
                    <td><button>x²</button></td>
                    <td><button class="num">1</button></td>
                    <td><button class="num">2</button></td>
                    <td><button class="num">3</button></td>
                    <td><button class="op">-</button></td>
                    <td><button>CE</button></td>
                </tr>
                <tr height="80">
                    <td><button>√x</button></td>
                    <td><button>%</button></td>
                    <td><button class="num">0</button></td>
                    <td><button class="num">.</button></td>
                    <td><button class="num">+/-</button></td>
                    <td><button class="op">+</button></td>
                    <td><button class="op">=</button></td>
                </tr>
            </table>
            <div class="logo-bar">
                <div class="copy"><strong>20253320</strong> 양현지</div>
            </div>
        </div>
    </div>

</body>

</html>
